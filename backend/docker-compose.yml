version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: gov_portal_postgres
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: true
    environment:
      POSTGRES_DB: gov_portal
      POSTGRES_USER: gov_user
      POSTGRES_PASSWORD: gov_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    tmpfs:
      - /tmp
      - /var/run/postgresql

volumes:
  postgres_data:
